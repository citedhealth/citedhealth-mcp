name: Publish to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write

env:
  UV_NO_SOURCES: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - run: uv publish --trusted-publishing always
